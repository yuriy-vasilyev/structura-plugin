<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Structura Meta Box Preview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #F0F0F1;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
}
.wp-meta-box {
    width: 280px;
    background: #fff;
    border: 1px solid #C3C4C7;
    box-shadow: 0 1px 1px rgba(0,0,0,.04);
}
.wp-meta-box__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid #C3C4C7;
}
.wp-meta-box__header h2 { font-size: 14px; font-weight: 600; color: #1D2327; }
.wp-meta-box__header .toggle { color: #787C82; font-size: 20px; }
.wp-meta-box__inside { padding: 0; margin: 0; }
</style>
<link rel="stylesheet" href="post-meta-box.css" />
</head>
<body>

<div class="wp-meta-box">
    <div class="wp-meta-box__header">
        <h2>Structura</h2>
        <span class="toggle">&#9650;</span>
    </div>
    <div class="wp-meta-box__inside" id="structura-post-info">
        <div class="structura-mb">

            <a href="#" class="structura-mb__campaign">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Excel Tips &amp; Tricks
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="structura-mb__arrow"><polyline points="9 18 15 12 9 6"/></svg>
            </a>

            <div class="structura-mb__pills">
                <div class="structura-mb__pill">
                    <span class="structura-mb__pill-label">Keyword</span>
                    <span class="structura-mb__pill-value">excel formulas</span>
                </div>
                <div class="structura-mb__pill">
                    <span class="structura-mb__pill-label">Keyphrase</span>
                    <span class="structura-mb__pill-value">Excel functional programming mastery</span>
                </div>
            </div>

            <div class="structura-mb__stats">
                <div class="structura-mb__stat">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4c0 1.95-1.4 3.58-3.25 3.93L12 22"/><path d="M12 2a4 4 0 0 0-4 4c0 1.95 1.4 3.58 3.25 3.93"/><path d="M8.56 13a10.1 10.1 0 0 0-.6 3.36c0 2.36 1.27 4.64 3.04 4.64"/><path d="M15.44 13a10.1 10.1 0 0 1 .6 3.36c0 2.36-1.27 4.64-3.04 4.64"/></svg>
                    <span>gpt-5.2-2025-12-11</span>
                </div>
                <div class="structura-mb__stat">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-3-3.87"/><path d="M4 21v-2a4 4 0 0 1 3-3.87"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>15,668 tokens used</span>
                </div>
                <div class="structura-mb__stat">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <span>Apr 8, 2026 at 2:34 PM</span>
                </div>
            </div>

            <div class="structura-mb__divider"></div>

            <div class="structura-mb__image-section">
                <div class="structura-mb__thumb" id="structura-thumb-wrap">
                    <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=400&h=225&fit=crop" alt="" />
                    <div class="structura-mb__thumb-overlay">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </div>
                </div>

                <button type="button" id="structura-regen-image" class="structura-mb__btn">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="structura-mb__btn-icon"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    <span>Regenerate Featured Image</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="structura-modal-backdrop" class="structura-modal-backdrop" style="display:none;">
    <div class="structura-modal">
        <div class="structura-modal__header">
            <h3>Generate Featured Image</h3>
            <button type="button" id="structura-modal-close" class="structura-modal__close">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="structura-modal__body">
            <div class="structura-modal__prompt-section">
                <label for="structura-modal-prompt" class="structura-modal__label">
                    Describe the image
                    <span class="structura-modal__label-hint">(optional)</span>
                </label>
                <textarea id="structura-modal-prompt" class="structura-modal__textarea" rows="2" placeholder="Leave blank to auto-generate from the post title. Omit style guidelines — your global art direction is applied automatically."></textarea>
            </div>
            <div id="structura-modal-preview" class="structura-modal__preview">
                <div class="structura-modal__preview-idle" id="structura-preview-idle">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <p>Click "Generate" to create a new image</p>
                </div>
                <div class="structura-modal__preview-loading" id="structura-preview-loading" style="display:none;">
                    <div class="structura-modal__spinner"></div>
                    <p>Generating your image...</p>
                    <div class="structura-modal__progress-bar">
                        <div class="structura-modal__progress-fill" id="structura-progress-fill"></div>
                    </div>
                </div>
                <div class="structura-modal__preview-result" id="structura-preview-result" style="display:none;">
                    <img id="structura-preview-img" src="https://images.unsplash.com/photo-1555949963-aa79dcee981c?w=600&h=340&fit=crop" alt="" />
                </div>
                <div class="structura-modal__preview-error" id="structura-preview-error" style="display:none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    <p id="structura-preview-error-msg">Something went wrong.</p>
                </div>
            </div>
        </div>
        <div class="structura-modal__footer">
            <button type="button" id="structura-modal-generate" class="structura-modal__btn-generate">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="structura-modal__btn-icon"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                <span>Generate</span>
            </button>
            <button type="button" id="structura-modal-apply" class="structura-modal__btn-apply" style="display:none;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span>Use this image</span>
            </button>
        </div>
    </div>
</div>

<script>
// Demo interactions
var modal = document.getElementById('structura-modal-backdrop');
var states = ['idle', 'loading', 'result', 'error'];

document.getElementById('structura-regen-image').addEventListener('click', function() {
    modal.style.display = 'flex';
});
document.getElementById('structura-modal-close').addEventListener('click', function() {
    modal.style.display = 'none';
});
modal.addEventListener('click', function(e) {
    if (e.target === modal) modal.style.display = 'none';
});

// Demo: cycle through states
document.getElementById('structura-modal-generate').addEventListener('click', function() {
    var btn = this;
    var applyBtn = document.getElementById('structura-modal-apply');

    // Show loading
    states.forEach(function(s) { document.getElementById('structura-preview-' + s).style.display = 'none'; });
    document.getElementById('structura-preview-loading').style.display = 'flex';
    btn.classList.add('is-loading');
    btn.querySelector('span').textContent = 'Generating\u2026';
    btn.disabled = true;
    applyBtn.style.display = 'none';

    // Animate progress
    var fill = document.getElementById('structura-progress-fill');
    fill.style.width = '0%';
    var pct = 0;
    var timer = setInterval(function() {
        pct += (90 - pct) * 0.06;
        fill.style.width = pct + '%';
    }, 200);

    setTimeout(function() {
        clearInterval(timer);
        fill.style.width = '100%';

        setTimeout(function() {
            states.forEach(function(s) { document.getElementById('structura-preview-' + s).style.display = 'none'; });
            document.getElementById('structura-preview-result').style.display = 'block';

            btn.classList.remove('is-loading');
            btn.querySelector('span').textContent = 'Try again';
            btn.disabled = false;
            applyBtn.style.display = 'flex';
        }, 300);
    }, 2500);
});
</script>

</body>
</html>
